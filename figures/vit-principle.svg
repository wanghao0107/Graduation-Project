<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .frame { fill:#ffffff; stroke:#111111; stroke-width:1.6; rx:12; ry:12; }
      .stage { fill:#f2f2f2; stroke:#777777; stroke-width:1.2; rx:10; ry:10; }
      .box { fill:#ffffff; stroke:#222222; stroke-width:1.8; rx:12; ry:12; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC',sans-serif; fill:#111111; }
      .text { font:500 14px 'Microsoft YaHei','PingFang SC',sans-serif; fill:#222222; }
      .arrow { stroke:#111111; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#111111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="380" fill="#ffffff"/>
  <rect x="18" y="22" width="1164" height="336" class="frame"/>
  <rect x="48" y="48" width="1104" height="46" class="stage"/>
  <text x="600" y="78" text-anchor="middle" class="label">Vision Transformer 处理流程</text>

  <rect x="58" y="140" width="170" height="120" class="box"/>
  <text x="143" y="182" text-anchor="middle" class="label">输入图像</text>
  <text x="143" y="212" text-anchor="middle" class="text">H × W × C</text>
  <text x="143" y="236" text-anchor="middle" class="text">二维图像表示</text>

  <rect x="286" y="140" width="190" height="120" class="box"/>
  <text x="381" y="182" text-anchor="middle" class="label">Patch 划分</text>
  <text x="381" y="212" text-anchor="middle" class="text">切分为 N 个图像块</text>
  <text x="381" y="236" text-anchor="middle" class="text">每块大小为 P × P</text>

  <rect x="534" y="140" width="230" height="120" class="box"/>
  <text x="649" y="182" text-anchor="middle" class="label">线性嵌入与位置编码</text>
  <text x="649" y="212" text-anchor="middle" class="text">Patch Embedding</text>
  <text x="649" y="236" text-anchor="middle" class="text">形成序列化特征</text>

  <rect x="822" y="126" width="190" height="148" class="box"/>
  <text x="917" y="170" text-anchor="middle" class="label">Transformer 编码器</text>
  <text x="917" y="202" text-anchor="middle" class="text">多头自注意力</text>
  <text x="917" y="228" text-anchor="middle" class="text">归一化与前馈网络</text>

  <rect x="1070" y="140" width="94" height="120" class="box"/>
  <text x="1117" y="182" text-anchor="middle" class="label">输出</text>
  <text x="1117" y="212" text-anchor="middle" class="text">全局</text>
  <text x="1117" y="236" text-anchor="middle" class="text">特征表示</text>

  <line x1="228" y1="200" x2="286" y2="200" class="arrow"/>
  <line x1="476" y1="200" x2="534" y2="200" class="arrow"/>
  <line x1="764" y1="200" x2="822" y2="200" class="arrow"/>
  <line x1="1012" y1="200" x2="1070" y2="200" class="arrow"/>
</svg>
