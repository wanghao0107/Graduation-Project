<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .frame { fill:#ffffff; stroke:#111111; stroke-width:1.6; rx:12; ry:12; }
      .stage { fill:#f2f2f2; stroke:#777777; stroke-width:1.2; rx:10; ry:10; }
      .box { fill:#ffffff; stroke:#222222; stroke-width:1.8; rx:12; ry:12; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC',sans-serif; fill:#111111; }
      .text { font:500 14px 'Microsoft YaHei','PingFang SC',sans-serif; fill:#222222; }
      .arrow { stroke:#111111; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#111111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="440" fill="#ffffff"/>
  <rect x="18" y="22" width="1164" height="396" class="frame"/>
  <rect x="48" y="48" width="1104" height="46" class="stage"/>
  <text x="600" y="78" text-anchor="middle" class="label">SAM 模型总体结构</text>

  <rect x="72" y="122" width="170" height="108" class="box"/>
  <text x="157" y="162" text-anchor="middle" class="label">输入图像</text>
  <text x="157" y="190" text-anchor="middle" class="text">原始图像 I</text>

  <rect x="72" y="264" width="170" height="108" class="box"/>
  <text x="157" y="304" text-anchor="middle" class="label">输入提示</text>
  <text x="157" y="332" text-anchor="middle" class="text">点、框或掩膜</text>

  <rect x="318" y="108" width="236" height="136" class="box"/>
  <text x="436" y="150" text-anchor="middle" class="label">图像编码器</text>
  <text x="436" y="180" text-anchor="middle" class="text">Vision Transformer</text>
  <text x="436" y="206" text-anchor="middle" class="text">提取图像嵌入特征</text>

  <rect x="318" y="250" width="236" height="136" class="box"/>
  <text x="436" y="292" text-anchor="middle" class="label">提示编码器</text>
  <text x="436" y="322" text-anchor="middle" class="text">编码 sparse / dense prompt</text>
  <text x="436" y="348" text-anchor="middle" class="text">生成提示嵌入</text>

  <rect x="652" y="178" width="254" height="136" class="box"/>
  <text x="779" y="220" text-anchor="middle" class="label">掩膜解码器</text>
  <text x="779" y="250" text-anchor="middle" class="text">融合图像特征与提示特征</text>
  <text x="779" y="276" text-anchor="middle" class="text">输出目标掩膜预测</text>

  <rect x="1004" y="178" width="124" height="136" class="box"/>
  <text x="1066" y="220" text-anchor="middle" class="label">输出</text>
  <text x="1066" y="250" text-anchor="middle" class="text">Mask</text>
  <text x="1066" y="276" text-anchor="middle" class="text">IoU 评分</text>

  <line x1="242" y1="176" x2="318" y2="176" class="arrow"/>
  <line x1="242" y1="318" x2="318" y2="318" class="arrow"/>
  <line x1="554" y1="176" x2="652" y2="224" class="arrow"/>
  <line x1="554" y1="318" x2="652" y2="268" class="arrow"/>
  <line x1="906" y1="246" x2="1004" y2="246" class="arrow"/>
</svg>
